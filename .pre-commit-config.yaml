default_install_hook_types:
  - pre-commit
  - commit-msg
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-xml
      - id: check-yaml
      - id: detect-private-key
      - id: mixed-line-ending
      - id: trailing-whitespace
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - --strict
          - --scopes
          - core,mallet
          - feat
          - fix
          - docs
          - style
          - refactor
          - perf
          - test
          - build
          - ci
          - chore
          - revert
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.4
    hooks:
      - id: check-jsonschema
        name: Validate issue form templates
        files: ^\.github/ISSUE_TEMPLATE/(bug_report|feature_request|task)\.yml$
        args:
          [
            "--schemafile",
            "https://json.schemastore.org/github-issue-forms.json",
          ]
      - id: check-jsonschema
        name: Validate issue template config
        files: ^\.github/ISSUE_TEMPLATE/config\.yml$
        args:
          [
            "--schemafile",
            "https://json.schemastore.org/github-issue-config.json",
          ]
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: prettier --write --ignore-unknown
        language: node
        additional_dependencies: ["prettier@3.7.4"]
      - id: spotless-apply
        name: Spotless Apply
        entry: ./gradlew spotlessApply
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: check
        name: Check
        entry: ./gradlew check
        language: system
        pass_filenames: false
        stages: [pre-commit]
