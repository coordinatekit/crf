name: Feature request
description: Propose a new feature or enhancement for the CRF library.
type: Feature
body:
  - type: markdown
    attributes:
      value: |
        Propose a new feature or enhancement. Describe the problem it solves and how you'd use it, not just the API you want.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: >-
        Which module would this feature belong to? This doesn't apply a label automatically;
        a maintainer adds the matching `area:` label during triage.
      multiple: true
      options:
        - core
        - mallet
        - annotator
        - cli
        - build
        - Not sure
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem are you trying to solve? Describe the use case, not the solution.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: Describe the feature or API you'd like to see. Include method signatures or configuration if you have a specific shape in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered, including workarounds you use today, and why they fall short.

  - type: textarea
    id: usage-example
    attributes:
      label: Usage example
      description: Sample code showing how you'd call the proposed feature.
      render: java
