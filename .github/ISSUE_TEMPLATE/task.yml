name: Task
description: Track maintenance work with no user-facing behavior change, such as a chore, refactor, doc update, or build/CI change.
type: Task
body:
  - type: markdown
    attributes:
      value: |
        Use this template for internally driven work: chores, refactors, documentation, tests, or build and CI changes.
        If this changes behavior a library user would notice, use the bug report or feature request template instead.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: >-
        Which module(s) does this task touch? This doesn't apply a label automatically;
        a maintainer adds the matching `area:` label during triage.
      multiple: true
      options:
        - core
        - mallet
        - annotator
        - cli
        - build
        - Not sure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: >-
        Describe the work and why it's needed. Mention the commit type this maps to
        (`chore`, `build`, `ci`, `refactor`, `docs`, or `test`) if it helps scope the task.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: List the conditions that must hold for this task to be done.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
