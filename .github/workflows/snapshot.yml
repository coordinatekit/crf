name: Snapshot

on:
  push:
    branches: ["main"]
    paths:
      - "**/src/**"
      - "**/*.gradle"
      - "gradle/**"
      - "gradlew*"
      - ".github/workflows/snapshot.yml"
  workflow_dispatch:

concurrency:
  group: snapshot-publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      is_snapshot: ${{ steps.version.outputs.is_snapshot }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew build

      - name: Determine if version is a snapshot
        id: version
        run: |
          VERSION=$(./gradlew -q --console=plain properties | awk -F': ' '/^version:/ {print $2}')
          echo "Project version: $VERSION"
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "is_snapshot=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_snapshot=false" >> "$GITHUB_OUTPUT"
          fi

  publish-maven-central-snapshots:
    needs: build
    if: needs.build.outputs.is_snapshot == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Publish library snapshots to Central Portal
        run: ./gradlew publishAllPublicationsToCentralSnapshotsRepository
        env:
          ORG_GRADLE_PROJECT_centralPortalUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_centralPortalPassword: ${{ secrets.SONATYPE_PASSWORD }}
