name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew build

  publish-maven-central:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Publish libraries to Maven Central
        run: ./gradlew publishToCentralPortal
        env:
          ORG_GRADLE_PROJECT_centralPortalUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_centralPortalPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSPHRASE }}

  publish-github-packages:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Publish CLI to GitHub Packages
        run: ./gradlew :cli:publishGitHubPackagesPublicationToGitHubPackagesRepository
        env:
          ORG_GRADLE_PROJECT_githubActor: ${{ github.actor }}
          ORG_GRADLE_PROJECT_githubToken: ${{ secrets.GITHUB_TOKEN }}

  github-release:
    needs: [publish-maven-central, publish-github-packages]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build CLI distribution
        run: ./gradlew :cli:distZip :cli:distTar

      - name: Extract release notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          ESCAPED_VERSION=$(echo "$VERSION" | sed 's/\./\\./g')
          awk "/^## \[${ESCAPED_VERSION}\]/{flag=1;next}/^## /{flag=0}flag" CHANGELOG.md > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release-notes.md
          files: |
            cli/build/distributions/crf-*.zip
            cli/build/distributions/crf-*.tar

  trigger-site:
    needs: [publish-maven-central, publish-github-packages]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger site release workflow
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.SITE_REPO_TOKEN }}
          repository: ${{ secrets.SITE_REPO_NAME }}
          event-type: library-release
          client-payload: '{"version": ${{ toJSON(github.ref_name) }}, "sha": ${{ toJSON(github.sha) }}}'
