name: Release
on:
  push:
    tags: [ 'v*' ]

permissions:
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build
        run: ./gradlew build

      - name: Publish to GitHub Packages
        run: ./gradlew publishMavenJavaPublicationToGitHubPackagesRepository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSPHRASE }}

  trigger-site:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Trigger site release workflow
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.SITE_REPO_TOKEN }}
          repository: ${{ secrets.SITE_REPO_NAME }}
          event-type: library-release
          client-payload: '{"version": ${{ toJSON(github.ref_name) }}, "sha": ${{ toJSON(github.sha) }}}'
