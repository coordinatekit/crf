name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish to GitHub Packages
        run: ./gradlew publishMavenJavaPublicationToGitHubPackagesRepository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSPHRASE }}

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract release notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          ESCAPED_TAG=$(echo "$TAG" | sed 's/\./\\./g')
          awk "/^## ${ESCAPED_TAG}/{flag=1;next}/^## /{flag=0}flag" CHANGELOG.md > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md

  trigger-site:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Trigger site release workflow
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.SITE_REPO_TOKEN }}
          repository: ${{ secrets.SITE_REPO_NAME }}
          event-type: library-release
          client-payload: '{"version": ${{ toJSON(github.ref_name) }}, "sha": ${{ toJSON(github.sha) }}}'
