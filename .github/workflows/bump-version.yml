name: Bump Version

on:
  workflow_dispatch:
    inputs:
      new-version:
        description: "New version (e.g., 0.2.0-SNAPSHOT)"
        required: true
      current-version:
        description: "Current version (leave blank to read from build.gradle)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run bump-version script
        env:
          NEW_VERSION: ${{ inputs.new-version }}
          CURRENT_VERSION: ${{ inputs.current-version }}
        run: |
          chmod +x scripts/bump-version.sh
          if [ -n "$CURRENT_VERSION" ]; then
            scripts/bump-version.sh "$NEW_VERSION" "$CURRENT_VERSION"
          else
            scripts/bump-version.sh "$NEW_VERSION"
          fi

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        env:
          NEW_VERSION: ${{ inputs.new-version }}
        with:
          commit-message: "Bump version to ${{ inputs.new-version }}"
          branch: "bump-version/${{ inputs.new-version }}"
          title: "Bump version to ${{ inputs.new-version }}"
          body: |
            Automated version bump to `${{ inputs.new-version }}`.

            Triggered by @${{ github.actor }} via workflow dispatch.
