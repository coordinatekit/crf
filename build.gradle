plugins {
    id "com.diffplug.spotless" version "6.25.0"
    id "java-library"
    id "net.ltgt.errorprone" version "4.1.0"
}

allprojects {
    group = "org.coordinatekit.crf"
    version = "0.1-SNAPSHOT"
}

subprojects {
    apply plugin: "com.diffplug.spotless"
    apply plugin: "jacoco"
    apply plugin: "java-library"
    apply plugin: "net.ltgt.errorprone"

    dependencies {
        errorprone "com.google.errorprone:error_prone_core:2.36.0"

        api "org.jspecify:jspecify:1.0.0"
        implementation "org.slf4j:slf4j-api:2.0.17"

        testImplementation(platform("org.junit:junit-bom:6.0.1"))
        testImplementation("org.junit.jupiter:junit-jupiter")
        testRuntimeOnly("org.junit.platform:junit-platform-launcher")
    }

    repositories {
        mavenCentral()
    }

    spotless {
        java {
            eclipse("4.21").configFile(rootProject.file(".infra/eclipse_java_coordinatekit.xml"))
            licenseHeaderFile rootProject.file(".infra/license_header.txt")
            target "src/**/*.java"
            trimTrailingWhitespace()
            toggleOffOn()
        }
    }

    test {
        useJUnitPlatform()
        finalizedBy jacocoTestReport
    }

    jacocoTestReport {
        dependsOn test
        reports {
            xml.required = true
            html.required = true
        }
    }
}

tasks.register('aggregateJavadoc', Javadoc) {
    description = "Generate aggregated Javadoc for all modules"
    group = "documentation"

    source subprojects.collect { it.sourceSets.main.allJava }
    classpath = files(subprojects.collect { it.sourceSets.main.compileClasspath })

    options {
        title = "CoordinateKit CRF ${version} API"
        windowTitle = "CoordinateKit CRF API"
        links = ["https://docs.oracle.com/en/java/javase/21/docs/api/"]
        encoding = "UTF-8"
        docEncoding = "UTF-8"
        charSet = "UTF-8"

        subprojects.each { subproject ->
            def pkgPattern = "org.coordinatekit.crf.${subproject.name}*"
            //noinspection GroovyAssignabilityCheck, ForeignDelegate
            group("${subproject.name.capitalize()} Module", [pkgPattern])
        }

        addBooleanOption('Werror', true)
    }
}